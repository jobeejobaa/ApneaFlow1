[build]
builder = "NIXPACKS"
buildCommand = "npm install --prefix frontend && npm run build --prefix frontend && npm install --prefix backend && cd backend && npx prisma generate"

[deploy]
startCommand = "cd backend && node_modules/.bin/prisma migrate resolve --applied 20260402000321_types_array_capacity; node_modules/.bin/prisma migrate resolve --applied 20260402002355_sessions_multi_dates; node_modules/.bin/prisma migrate deploy && node src/index.js"
